name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew || echo "gradlew not found, will use gradle wrapper download"

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace || ./gradlew wrapper --gradle-version 8.4 && ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Get APK info
        run: |
          echo "Debug APK size:"
          ls -lh app/build/outputs/apk/debug/app-debug.apk || echo "Debug APK not found"
          echo "Release APK size:"
          ls -lh app/build/outputs/apk/release/app-release-unsigned.apk || echo "Release APK not found"
